schema_version: "1.0"

limits:
  minimum_profiles: 6
  maximum_profiles: 12

threads:
  fractions_of_physical_cores: [0.50, 0.75, 1.00]
  include_baseline: true

threads_batch:
  fractions_of_physical_cores: [0.50, 1.00]
  include_baseline: true
  allow_greater_than_generation_threads: true

batch_sizes: [128, 256, 512]
ubatch_sizes: [64, 128]
parallel_slots: [1, 2]
prompt_cache: [false, true]
mmap: [true]
numa_modes: [disabled]
enable_numa_experiments: false

context:
  policy: baseline
  explicit_sizes: []
